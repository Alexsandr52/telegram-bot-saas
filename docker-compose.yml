# ============================================
# Telegram Bot SaaS - Docker Compose
# Local Development Environment
# ============================================

version: '3.9'

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  database:
    image: postgres:15-alpine
    container_name: bot_saas_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-bot_saas}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/init:/docker-entrypoint-initdb.d/scripts
    networks:
      - bot_saas_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bot_saas}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================
  # Redis (Cache & Queue)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: bot_saas_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - bot_saas_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # pgAdmin (Database Management UI)
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bot_saas_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@botsaas.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - bot_saas_network
    depends_on:
      - database

  # ============================================
  # Redis Commander (Redis Management UI)
  # ============================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: bot_saas_redis_commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-redis123}
    ports:
      - "${REDIS_COMMANDER_PORT:-8082}:8081"
    networks:
      - bot_saas_network
    depends_on:
      - redis

  # ============================================
  # Platform Bot (Main bot for masters)
  # ============================================
  platform-bot:
    build:
      context: ./platform-bot
      dockerfile: Dockerfile
    container_name: bot_saas_platform_bot
    restart: unless-stopped
    environment:
      # Bot Configuration
      BOT_TOKEN: ${PLATFORM_BOT_TOKEN}
      BOT_WEBHOOK_MODE: "false"
      BOT_WEBHOOK_SECRET: ${PLATFORM_BOT_WEBHOOK_SECRET}

      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@database:5432/${POSTGRES_DB:-bot_saas}

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      REDIS_ENABLED: ${REDIS_ENABLED:-true}

      # Security
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}

      # Factory Service
      FACTORY_SERVICE_URL: http://factory-service:8002

      # Web Panel URL
      WEB_PANEL_URL: ${WEB_PANEL_URL:-http://localhost:3000}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEBUG: ${DEBUG:-false}

      # Proxy (optional, for VPN)
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-database,redis,factory-service,web-api,web-panel,notification-service}
    networks:
      - bot_saas_network
    depends_on:
      - database
      - redis
    volumes:
      - ./platform-bot/src:/app/src

  # ============================================
  # Factory Service (Bot container management)
  # ============================================
  factory-service:
    build:
      context: ./factory-service
      dockerfile: Dockerfile
    container_name: bot_saas_factory_service
    restart: unless-stopped
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@database:5432/${POSTGRES_DB:-bot_saas}

      # Docker
      DOCKER_HOST: unix:///var/run/docker.sock

      # Security
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - bot_saas_network
    depends_on:
      - database
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./factory-service/src:/app/src
    ports:
      - "8002:8002"

  # ============================================
  # Web API (Backend for web panel)
  # ============================================
  web-api:
    build:
      context: ./web-api
      dockerfile: Dockerfile
    container_name: bot_saas_web_api
    restart: unless-stopped
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@database:5432/${POSTGRES_DB:-bot_saas}

      # Security
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}

      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:80}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEBUG: ${DEBUG:-false}
    networks:
      - bot_saas_network
    depends_on:
      - database
    ports:
      - "8000:8000"

  # ============================================
  # Web Panel (Frontend for masters)
  # ============================================
  web-panel:
    build:
      context: ./web-panel
      dockerfile: Dockerfile
    container_name: bot_saas_web_panel
    restart: unless-stopped
    networks:
      - bot_saas_network
    ports:
      - "3000:80"

  # ============================================
  # Notification Service (Reminders & Alerts)
  # ============================================
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: bot_saas_notification_service
    restart: unless-stopped
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@database:5432/${POSTGRES_DB:-bot_saas}

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      REDIS_ENABLED: ${REDIS_ENABLED:-true}

      # Notification settings
      NOTIFICATION_CHECK_INTERVAL: ${NOTIFICATION_CHECK_INTERVAL:-300}
      NOTIFICATION_WORKER_CONCURRENCY: ${NOTIFICATION_WORKER_CONCURRENCY:-2}

      # Retry settings
      MAX_RETRY_ATTEMPTS: ${MAX_RETRY_ATTEMPTS:-3}
      RETRY_DELAY_SECONDS: ${RETRY_DELAY_SECONDS:-300}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEBUG: ${DEBUG:-false}
    networks:
      - bot_saas_network
    depends_on:
      - database
      - redis

  # ============================================
  # Logging Service (Centralized Log Management)
  # ============================================
  logging-service:
    build:
      context: ./shared/logging
      dockerfile: Dockerfile
    container_name: bot_saas_logging_service
    restart: unless-stopped
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@database:5432/${POSTGRES_DB:-bot_saas}

      # API
      HOST: 0.0.0.0
      PORT: 8001

      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:80}

      # Logging configuration
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_FILE_PATH: /var/log/logging/app.log
      LOG_TO_DB: ${LOG_TO_DB:-true}
      SENTRY_DSN: ${SENTRY_DSN:-}
    networks:
      - bot_saas_network
    depends_on:
      - database
    volumes:
      - ./logs:/var/log/logging
    ports:
      - "8001:8001"

  # ============================================
  # Nginx (API Gateway & Reverse Proxy)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: bot_saas_nginx
    restart: unless-stopped
    environment:
      SERVER_DOMAIN: ${SERVER_DOMAIN:-localhost}
      SSL_CERT_PATH: ${SSL_CERT_PATH:-/etc/nginx/ssl/fullchain.pem}
      SSL_KEY_PATH: ${SSL_KEY_PATH:-/etc/nginx/ssl/privkey.pem}
    networks:
      - bot_saas_network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - platform-bot
      - factory-service
      - web-api
      - web-panel
      - notification-service

# ============================================
# Networks
# ============================================
networks:
  bot_saas_network:
    name: bot_saas_network
    driver: bridge

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
    name: bot_saas_postgres_data
    driver: local

  redis_data:
    name: bot_saas_redis_data
    driver: local

  pgadmin_data:
    name: bot_saas_pgadmin_data
    driver: local
