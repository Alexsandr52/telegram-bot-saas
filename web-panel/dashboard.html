<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot SaaS - Панель управления</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🤖 Bot SaaS</h2>
            </div>

            <nav>
                <ul class="nav-menu">
                    <li class="nav-item">
                        <a class="nav-link active" data-page="bots">
                            <span class="icon">🤖</span>
                            Мои боты
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-page="appointments">
                            <span class="icon">📋</span>
                            Записи
                        </a>
                    </li>
                </ul>
            </nav>

            <div style="margin-top: auto; padding-top: 24px; border-top: 1px solid var(--border-color);">
                <a class="nav-link" id="logoutBtn">
                    <span class="icon">🚪</span>
                    Выйти
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Bots Page -->
            <div id="botsPage" class="page active">
                <div class="content-header">
                    <h1>Мои боты</h1>
                    <p class="breadcrumb">Выберите бота для управления</p>
                </div>

                <div id="botsList"></div>
            </div>

            <!-- Bot Detail Page -->
            <div id="botDetailPage" class="page" style="display: none;">
                <div class="content-header">
                    <h1 id="botTitle">Бот</h1>
                    <p class="breadcrumb"><a href="#" onclick="showPage('bots')">← Назад к ботам</a></p>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">📋 Записи</h3>
                        <div>
                            <select id="statusFilter" class="form-input" style="width: auto;">
                                <option value="">Все статусы</option>
                                <option value="pending">Ожидают</option>
                                <option value="confirmed">Подтверждены</option>
                                <option value="completed">Завершены</option>
                                <option value="cancelled">Отменены</option>
                            </select>
                        </div>
                    </div>
                    <div id="appointmentsList"></div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">📝 Услуги</h3>
                        <button class="btn btn-primary btn-sm" onclick="showAddServiceModal()">+ Добавить</button>
                    </div>
                    <div id="servicesList"></div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">📅 Расписание</h3>
                    </div>
                    <div id="scheduleList"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Service Modal -->
    <div id="serviceModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="serviceModalTitle">Добавить услугу</h2>
                <button class="modal-close" onclick="closeServiceModal()">&times;</button>
            </div>
            <form id="serviceForm" onsubmit="handleServiceSubmit(event)">
                <input type="hidden" id="serviceId">

                <div class="form-group">
                    <label for="serviceName">Название услуги *</label>
                    <input
                        type="text"
                        id="serviceName"
                        class="form-input"
                        placeholder="Например: Стрижка мужская"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="serviceDescription">Описание</label>
                    <textarea
                        id="serviceDescription"
                        class="form-input"
                        rows="3"
                        placeholder="Подробное описание услуги"
                    ></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="servicePrice">Цена (₽) *</label>
                        <input
                            type="number"
                            id="servicePrice"
                            class="form-input"
                            placeholder="1000"
                            min="0"
                            step="0.01"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="serviceDuration">Длительность (мин) *</label>
                        <input
                            type="number"
                            id="serviceDuration"
                            class="form-input"
                            placeholder="30"
                            min="5"
                            step="5"
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="serviceActive" checked>
                        <span>Активна (показывать в боте)</span>
                    </label>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeServiceModal()">Отмена</button>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <script src="static/js/api.js"></script>
    <script src="static/js/dashboard.js"></script>
</body>
</html>
