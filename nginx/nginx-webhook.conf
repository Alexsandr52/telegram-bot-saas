# ============================================
# Nginx Configuration for Telegram Bot Webhooks
# Supports both ngrok (local) and real domain (production)
# ============================================

events {
    worker_connections 1024;
}

http {
    upstream web_api {
        server web-api:8000;
    }

    upstream web_panel {
        server web-panel:80;
    }

    # Upstream for bot webhooks (will be dynamically configured)
    upstream bot_webhooks {
        server 127.0.0.1:9999; # Fallback, will be overridden
    }

    server {
        listen 80;
        server_name ${SERVER_DOMAIN:-localhost};

        # Web API
        location /api/ {
            proxy_pass http://web_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # Web Panel
        location / {
            proxy_pass http://web_panel;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Bot Webhooks - Dynamic routing based on bot_id
        # Format: /webhook/{bot_id}
        location /webhook/ {
            # Extract bot_id from path
            set $bot_id $1;

            # Proxy to the correct bot container
            # Each bot container exposes a webhook endpoint on port 8080
            # We'll use a dynamic upstream approach
            proxy_pass http://bot_webhooks;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Telegram-Bot-Id $bot_id;

            # Timeout for Telegram webhook (can take up to 2 minutes)
            proxy_read_timeout 120s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Nginx status (for monitoring)
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.0.0.0/8;  # Docker network
            deny all;
        }
    }

    # HTTPS Server (for production with SSL)
    server {
        listen 443 ssl http2;
        server_name ${SERVER_DOMAIN:-localhost};

        # SSL certificates (will be mounted)
        ssl_certificate ${SSL_CERT_PATH:-/etc/nginx/ssl/fullchain.pem};
        ssl_certificate_key ${SSL_KEY_PATH:-/etc/nginx/ssl/privkey.pem};

        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;

        # Session cache
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS (only for production)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Same locations as HTTP
        location /api/ {
            proxy_pass http://web_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        location / {
            proxy_pass http://web_panel;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /webhook/ {
            set $bot_id $1;
            proxy_pass http://bot_webhooks;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Telegram-Bot-Id $bot_id;
            proxy_read_timeout 120s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # HTTP to HTTPS redirect (only for production with domain)
    server {
        listen 80;
        server_name ${SERVER_DOMAIN:-localhost};

        # Only redirect if we have a real domain
        if ($server_name != "localhost") {
            return 301 https://$server_name$request_uri;
        }

        # For localhost, serve normally (as above)
        location /api/ {
            proxy_pass http://web_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        location / {
            proxy_pass http://web_panel;
            proxy_set_header Host $host;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
