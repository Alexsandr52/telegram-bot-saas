# ============================================
# Nginx Production Configuration
# For Telegram Bot SaaS with SSL
# ============================================

events {
    worker_connections 1024;
}

http {
    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=webhook_zone:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=3r/s;

    upstream web_api {
        server web-api:8000;
    }

    upstream web_panel {
        server web-panel:80;
    }

    upstream logging_api {
        server logging-service:8003;
    }

    # ============================================
    # HTTP Server - Handles ACME challenge & redirects to HTTPS
    # ============================================
    server {
        listen 80;
        server_name ${SERVER_DOMAIN};

        # ACME Challenge for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # ============================================
    # HTTPS Server - Main production server
    # ============================================
    server {
        listen 443 ssl http2;
        server_name ${SERVER_DOMAIN};

        # SSL Certificates
        ssl_certificate /etc/letsencrypt/live/${SERVER_DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${SERVER_DOMAIN}/privkey.pem;

        # SSL Configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;

        # SSL Session Cache
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # SSL OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/letsencrypt/live/${SERVER_DOMAIN}/chain.pem;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ============================================
        # Web API
        # ============================================
        location /api/ {
            # Rate limiting
            limit_req zone=api_general burst=20 nodelay;

            proxy_pass http://web_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Timeouts
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
            proxy_send_timeout 300s;

            # Buffering
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # ============================================
        # Web Panel (Frontend)
        # ============================================
        location / {
            proxy_pass http://web_panel;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ============================================
        # Platform Bot Webhook
        # ============================================
        location /webhook/platform {
            # Rate limiting for webhook
            limit_req zone=webhook_zone burst=10 nodelay;

            # Only allow POST from Telegram
            limit_except POST {
                deny all;
            }

            # Proxy to platform bot
            proxy_pass http://platform_bot;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            # Long timeout for Telegram webhook
            proxy_read_timeout 120s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;

            # Don't buffer - important for webhook
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # ============================================
        # Dynamic Bot Webhooks
        # Format: /webhook/{bot_id}
        # ============================================
        location /webhook/ {
            # Rate limiting for webhooks
            limit_req zone=webhook_zone burst=10 nodelay;

            # Only allow POST from Telegram
            limit_except POST {
                deny all;
            }

            # Extract bot_id and proxy to appropriate container
            # The factory service should configure proper routing
            proxy_pass http://bot_webhooks;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Telegram-Bot-Id $request_uri;

            # Long timeout for Telegram webhook
            proxy_read_timeout 120s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;

            # Don't buffer
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # ============================================
        # Logging API
        # ============================================
        location /api/v1/logs {
            proxy_pass http://logging_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # ============================================
        # Health Check Endpoint
        # ============================================
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ============================================
        # Rate Limiting Responses
        # ============================================
        # Custom error page for rate limiting
        error_page 429 =429toomanyrequests;
        location =429toomanyrequests {
            internal;
            default_type application/json;
            return 429 '{"error": "Too many requests", "message": "Rate limit exceeded. Please try again later."}';
        }

        # ============================================
        # Nginx Status (Internal monitoring only)
        # ============================================
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12;  # Docker network
            deny all;
        }

        # ============================================
        # Robots.txt
        # ============================================
        location /robots.txt {
            return 200 "User-agent: *\nDisallow: /api/\nDisallow: /webhook/\n";
            add_header Content-Type text/plain;
        }
    }

    # ============================================
    # Upstream for bot webhooks (dynamic)
    # ============================================
    upstream bot_webhooks {
        # This will be dynamically updated by the factory service
        # Each bot container will be registered here
        # For now, proxy to factory service for routing
        server factory-service:8002;
    }

    upstream platform_bot {
        server platform-bot:8080;
    }
}
